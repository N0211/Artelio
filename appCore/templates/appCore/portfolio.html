{% extends "appCore/layout.html" %}

{% block title %}Portfolio{% endblock %}

{% block content %}
<h2>Art Portfolio</h2>
<div class="artwork-grid">
    {% for artwork in artworks %}
    <div class="artwork-item">
        <img src="{{ artwork.image.url }}" alt="{{ artwork.title }}">
        <h3><a href="{% url 'artwork_detail' artwork.pk %}">{{ artwork.title }}</a></h3>
        <p>By: <a href="{% url 'artist_profile' artwork.artist.username %}">{{ artwork.artist.username }}</a></p>
    </div>
    {% endfor %}
</div>
<a href="{% url 'upload_artwork' %}">Upload New Artwork</a>
{% endblock %}
